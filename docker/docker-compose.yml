name: sendwalk-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: sendwalk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sendwalk
      POSTGRES_PASSWORD: sendwalk
      POSTGRES_DB: sendwalk
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sendwalk -d sendwalk"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sendwalk-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: sendwalk-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: sendwalk
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sendwalk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sendwalk
      MINIO_ROOT_PASSWORD: sendwalk-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: sendwalk-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 sendwalk sendwalk-secret;
      mc mb -p local/sendwalk-uploads || true;
      mc mb -p local/sendwalk-public || true;
      mc anonymous set download local/sendwalk-public || true;
      echo 'MinIO buckets ready';
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sendwalk-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

networks:
  default:
    name: sendwalk-net
